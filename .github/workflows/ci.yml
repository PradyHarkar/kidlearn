name: CI — Build Check

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-placeholder-secret
          NEXTAUTH_URL: http://localhost:3000
          AWS_REGION: ap-southeast-2
          BEDROCK_REGION: us-east-1
          BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20241022-v2:0
          DYNAMODB_USERS_TABLE: kidlearn-users
          DYNAMODB_CHILDREN_TABLE: kidlearn-children
          DYNAMODB_QUESTIONS_TABLE: kidlearn-questions
          DYNAMODB_PROGRESS_TABLE: kidlearn-progress
          DYNAMODB_ACHIEVEMENTS_TABLE: kidlearn-achievements
          DYNAMODB_SESSIONS_TABLE: kidlearn-sessions
          DYNAMODB_SUBSCRIPTIONS_TABLE: kidlearn-subscriptions
          STRIPE_SECRET_KEY: sk_test_placeholder_for_ci_build_only
          STRIPE_WEBHOOK_SECRET: whsec_placeholder_for_ci_build_only
          STRIPE_PRICE_AU_WEEKLY: price_placeholder
          STRIPE_PRICE_AU_ANNUAL: price_placeholder
          STRIPE_PRICE_US_WEEKLY: price_placeholder
          STRIPE_PRICE_US_ANNUAL: price_placeholder
          STRIPE_PRICE_IN_WEEKLY: price_placeholder
          STRIPE_PRICE_IN_ANNUAL: price_placeholder
          STRIPE_PRICE_UK_WEEKLY: price_placeholder
          STRIPE_PRICE_UK_ANNUAL: price_placeholder
          SES_FROM_EMAIL: noreply@example.com
          CRON_SECRET: ci-cron-secret-placeholder
