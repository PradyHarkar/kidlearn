version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || true
        - node --version
        - npm ci
        - echo "=== Verifying source files ==="
        - ls lib/curriculum.ts components/mascot/Mascot.tsx || echo "MISSING FILES"
        - echo "=== Done ==="
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
