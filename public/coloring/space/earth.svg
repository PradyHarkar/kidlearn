<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 570" width="400" height="570">
  <rect width="400" height="570" fill="white"/>
  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="554" fill="none" stroke="#000" stroke-width="3" rx="16"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="368" height="538" fill="none" stroke="#000" stroke-width="1.5" rx="12" stroke-dasharray="6,4"/>
  <circle cx="200" cy="210" r="155" fill="none" stroke="#000" stroke-width="9"/>
  <!-- Rough continents as blobs -->
  <path d="M155,100 Q195,85 230,110 Q260,130 265,175 Q255,210 230,220 Q210,235 185,225 Q155,215 140,185 Q125,155 155,100 Z" fill="none" stroke="#000" stroke-width="5"/>
  <path d="M100,200 Q115,175 140,185 Q155,215 140,245 Q120,260 100,245 Q80,225 100,200 Z" fill="none" stroke="#000" stroke-width="5"/>
  <path d="M210,250 Q240,240 260,265 Q270,290 250,310 Q225,325 205,310 Q185,295 210,250 Z" fill="none" stroke="#000" stroke-width="5"/>
  <!-- Equator and meridian lines -->
  <line x1="45" y1="210" x2="355" y2="210" stroke="#000" stroke-width="2.5" stroke-dasharray="5,4"/>
  <ellipse cx="200" cy="210" rx="155" ry="55" fill="none" stroke="#000" stroke-width="2.5" stroke-dasharray="5,4"/>
  <!-- Title -->
  <text x="200" y="538" font-family="Arial Black, sans-serif" font-size="20"
        text-anchor="middle" fill="#000" font-weight="900">Planet Earth</text>
  <text x="200" y="558" font-family="Arial, sans-serif" font-size="13"
        text-anchor="middle" fill="#555">Blast off! 🚀</text>
  <!-- KidLearn branding -->
  <text x="380" y="566" font-family="Arial, sans-serif" font-size="9"
        text-anchor="end" fill="#ccc">KidLearn</text>
</svg>